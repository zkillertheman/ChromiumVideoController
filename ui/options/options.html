<!doctype html>
<html>
  <head>
    <title>Video Speed Controller: Options</title>
    <link rel="stylesheet" href="options.css" />
    <script src="options.js"></script>
  </head>

  <body>
    <header>
      <nav class="header-tabs">
        <img src="../../assets/icons/icon48.png" alt="" class="header-icon" />
        <button id="tab-settings" class="header-tab active">Settings</button>
      </nav>
      <div class="split-button">
        <button id="save" class="split-primary">Save</button>
        <button id="split-toggle" class="split-arrow" aria-label="More actions">&#9662;</button>
        <div id="split-menu" class="split-dropdown" hidden>
          <button id="import">Import</button>
          <button id="export">Export</button>
          <button id="restore">Reset</button>
        </div>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>
    </header>

    <!-- ============ SETTINGS TAB ============ -->
    <div id="panel-settings">
      <section id="customs">
        <h3>Shortcuts</h3>
        <p class="shortcut-help">
          Value uses seconds for skip and reverse, percent for chapter skip and volume, and 0.1x steps for speed.
          Pause has no value.
        </p>
        <div class="shortcut-groups">
          <div class="shortcut-group">
            <h4>Chapter settings</h4>
            <div id="chapter-shortcuts-container"></div>
          </div>
          <div class="shortcut-group">
            <h4>Other settings</h4>
            <div id="other-shortcuts-container"></div>
          </div>
        </div>
        <button id="add">Add New</button>
      </section>

      <section>
        <h3>Preferences</h3>
        <div class="row">
          <label for="audioBoolean"
            >Audio support<br />
            <em>Show speed controls on audio elements.</em></label
          >
          <input id="audioBoolean" type="checkbox" />
        </div>
        <div class="row">
          <label for="startHidden"
            >Hide controller by default<br />
            <em>Controller stays hidden until toggled via shortcut.</em></label
          >
          <input id="startHidden" type="checkbox" />
        </div>
        <div class="row">
          <label for="exclusiveKeys"
            >Exclusive keyboard shortcuts<br />
            <em>When possible, prevent websites from also handling VSC shortcut keys.</em></label
          >
          <input id="exclusiveKeys" type="checkbox" />
        </div>
      </section>

      <section>
        <h3>Controller</h3>
        <div class="row">
          <label for="controllerOpacity"
            >Controller opacity<br />
            <em>0 = fully transparent, 1 = fully opaque. Default: 0.3</em>
          </label>
          <input id="controllerOpacity" type="text" value="" />
        </div>
        <div class="row">
          <label for="controllerButtonSize"
            >Controller button size<br />
            <em>Font size in pixels for the speed display and buttons. Default: 14</em>
          </label>
          <input id="controllerButtonSize" type="text" value="" />
        </div>
      </section>

      <section>
        <h3>Behavior</h3>
        <div class="row">
          <label for="logLevel"
            >Console Log Level<br />
            <em>Set verbosity in the browser console</em></label
          >
          <select id="logLevel">
            <option value="1">None</option>
            <option value="2">Error</option>
            <option value="3">Warning</option>
            <option value="4">Info</option>
            <option value="5">Debug</option>
            <option value="6">Verbose</option>
          </select>
        </div>
      </section>

      <section>
        <h3>Site Rules</h3>
        <div class="row">
          <label
            >Site rules<br />
            <em
              >Per-site overrides. Use a domain or
              <a href="https://www.regexpal.com/">regex</a> (e.g. <code>/\.edu$/i</code>). Check
              "Disable" to turn off the extension on that site.</em
            >
          </label>
          <div id="site-rules-container">
            <div class="site-rules-header">
              <span>Pattern</span>
              <span>Disable</span>
            </div>
          </div>
          <button id="add-site-rule">Add Site Rule</button>
          <div id="siteRulesValidation" class="css-validation"></div>
        </div>
      </section>

      <section>
        <h3>Controller CSS</h3>
        <div class="row">
          <label for="controllerCSS"
            >Controller CSS<br />
            <em
              >Customize controller positioning per site.
              <a href="#" id="resetCSS">Reset to defaults</a>.</em
            >
          </label>
          <div class="css-editor">
            <pre id="cssHighlight" class="css-highlight" aria-hidden="true"></pre>
            <textarea id="controllerCSS" rows="30" spellcheck="false"></textarea>
          </div>
          <div id="cssValidation" class="css-validation"></div>
        </div>
      </section>
    </div>

    <!-- status bar -->

    <div id="status"></div>

  </body>
</html>
